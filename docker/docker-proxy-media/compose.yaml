name: docker-proxy-media
services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1   # Required for container discovery
      - SERVICES=1     # Required if using Docker Swarm
      - TASKS=1        # Required if using Docker Swarm
      - POST=0         # Read-only — no write access
    ports:
      - 2375:2375      # Binds to all interfaces; see security note below
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped