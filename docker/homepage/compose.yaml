name: homepage
services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1   # Required for container discovery
      - SERVICES=1     # Required if using Docker Swarm
      - TASKS=1        # Required if using Docker Swarm
      - POST=0         # Read-only — no write access
    ports:
      - 2375:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.8.0
    container_name: homepage
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
    ports:
      - 3000:3000
    volumes:
      - /opt/appdata/homepage/config:/app/config # Make sure your local config directory exists
      - ./config/bookmarks.yaml:/app/config/bookmarks.yaml
      - ./config/docker.yaml:/app/config/docker.yaml
      - ./config/services.yaml:/app/config/services.yaml
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./config/widgets.yaml:/app/config/widgets.yaml
      # - /var/run/docker.sock:/var/run/docker.sock:ro # optional, for docker integrations
    restart: unless-stopped