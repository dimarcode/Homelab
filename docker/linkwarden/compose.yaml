name: linkwarden
services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    restart: always
    volumes:
      - /opt/appdata/linkwarden/pgdata:/var/lib/postgresql/data
  linkwarden:
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
    restart: always
    # build: . # uncomment to build from source
    image: ghcr.io/linkwarden/linkwarden:latest # comment to build from source
    ports:
      - 3000:3000
    volumes:
      - /opt/appdata/linkwarden/data:/data/data
    depends_on:
      - postgres
      - meilisearch
    # labels:
      # homepage.group: Personal Media
      # homepage.name: Linkwarden
      # homepage.icon: linkwarden.png
      # homepage.description: "Bookmark manager"
      # homepage.href: ${HOMEPAGE_VAR_LINKWARDEN_URL}
      # homepage.widget.type: linkwarden
      # homepage.widget.url: ${HOMEPAGE_VAR_LINKWARDEN_URL}
      # homepage.widget.key: ${HOMEPAGE_VAR_LINKWARDEN_KEY} # On your Linkwarden install, go to Settings > Access Tokens. Generate a token.
  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    restart: always
    env_file:
      - .env
    volumes:
      - /opt/appdata/linkwarden/meili_data:/meili_data
